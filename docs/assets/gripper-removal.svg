<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 300" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="m" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#cbd5e1"/><stop offset=".5" stop-color="#f1f5f9"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
  </defs>
  <text x="30" y="34" font-size="22" font-weight="700" fill="#0f172a">Removing the gripper — safe sequence</text>

  <!-- panel template -->
  <g>
    <!-- 1 power down -->
    <rect x="20" y="55" width="210" height="200" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="50" cy="85" r="15" fill="#dc2626"/><text x="50" y="91" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="74" y="90" font-size="14" font-weight="700" fill="#0f172a">Make safe</text>
    <!-- estop -->
    <circle cx="125" cy="160" r="42" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
    <circle cx="125" cy="160" r="22" fill="#dc2626"/>
    <text x="125" y="225" font-size="11.5" fill="#475569" text-anchor="middle">clear area · isolate &amp; lock out</text>
    <text x="125" y="241" font-size="11.5" fill="#475569" text-anchor="middle">(LOTO) · confirm brakes hold</text>
  </g>
  <g>
    <!-- 2 disconnect cable -->
    <rect x="245" y="55" width="210" height="200" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="275" cy="85" r="15" fill="#f59e0b"/><text x="275" y="91" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="299" y="90" font-size="14" font-weight="700" fill="#0f172a">Disconnect tool</text>
    <rect x="310" y="130" width="80" height="40" rx="6" fill="url(#m)" stroke="#475569" stroke-width="2"/>
    <path d="M390 150 h45" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <circle cx="300" cy="150" r="7" fill="#334155"/>
    <text x="350" y="200" font-size="12" fill="#475569" text-anchor="middle">unplug electrical /</text>
    <text x="350" y="216" font-size="12" fill="#475569" text-anchor="middle">pneumatic connector first</text>
  </g>
  <g>
    <!-- 3 loosen bolts -->
    <rect x="470" y="55" width="210" height="200" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="500" cy="85" r="15" fill="#f59e0b"/><text x="500" y="91" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="524" y="90" font-size="14" font-weight="700" fill="#0f172a">Loosen 4× M6</text>
    <circle cx="575" cy="160" r="45" fill="#e2e8f0" stroke="#475569" stroke-width="2.5"/>
    <g fill="#1e293b"><circle cx="575" cy="125" r="7"/><circle cx="610" cy="160" r="7"/><circle cx="575" cy="195" r="7"/><circle cx="540" cy="160" r="7"/></g>
    <!-- hex key -->
    <path d="M575 160 l40 -40" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <text x="575" y="232" font-size="12" fill="#475569" text-anchor="middle">cross-pattern · keep last</text>
    <text x="575" y="248" font-size="12" fill="#475569" text-anchor="middle">screw until gripper supported</text>
  </g>
  <g>
    <!-- 4 lift off -->
    <rect x="695" y="55" width="225" height="200" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="725" cy="85" r="15" fill="#16a34a"/><text x="725" y="91" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="749" y="90" font-size="14" font-weight="700" fill="#0f172a">Lift straight off</text>
    <ellipse cx="805" cy="135" rx="46" ry="11" fill="url(#m)" stroke="#475569" stroke-width="2"/>
    <rect x="772" y="170" width="66" height="44" rx="6" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
    <path d="M805 168 v-22" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
    <path d="M805 150 l-7 10 m7 -10 l7 10" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="807" y="234" font-size="12" fill="#475569" text-anchor="middle">mind the dowel/boss ·</text>
    <text x="807" y="250" font-size="12" fill="#475569" text-anchor="middle">store gripper + screws</text>
  </g>
  <text x="30" y="288" font-size="12" fill="#94a3b8">Follow your robot/gripper manual for the exact connector, hex size and torque. Schematic only.</text>
</svg>
