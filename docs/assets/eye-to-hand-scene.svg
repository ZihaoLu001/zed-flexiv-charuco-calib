<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="t" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0 0L11 5.5L0 11z" fill="#7c3aed"/></marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e2e8f0"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
  </defs>

  <text x="30" y="40" font-size="24" font-weight="700" fill="#0f172a">Eye-to-hand setup</text>
  <text x="30" y="64" font-size="14" fill="#475569">Camera FIXED in the workspace · ChArUco board on the moving flange · solve T<tspan font-size="10" dy="3">base←camera</tspan></text>

  <!-- floor -->
  <line x1="40" y1="430" x2="860" y2="430" stroke="#cbd5e1" stroke-width="2"/>

  <!-- robot base + arm -->
  <g>
    <rect x="120" y="380" width="120" height="50" rx="6" fill="url(#g1)" stroke="#475569" stroke-width="2"/>
    <text x="180" y="410" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">Rizon base</text>
    <!-- base frame -->
    <g stroke-width="3">
      <line x1="180" y1="380" x2="180" y2="340" stroke="#16a34a"/><line x1="180" y1="380" x2="220" y2="380" stroke="#dc2626"/>
    </g>
    <text x="225" y="384" font-size="12" fill="#dc2626">x</text><text x="172" y="335" font-size="12" fill="#16a34a">z</text>
    <text x="150" y="360" font-size="13" font-weight="700" fill="#0f172a">base frame</text>
    <!-- arm links -->
    <path d="M180 380 L250 250 L380 200" fill="none" stroke="#64748b" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M180 380 L250 250 L380 200" fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="250" cy="250" r="10" fill="#475569"/>
  </g>

  <!-- board on flange -->
  <g transform="translate(380,200) rotate(18)">
    <rect x="0" y="-55" width="14" height="110" rx="3" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
    <rect x="14" y="-60" width="92" height="120" rx="5" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
    <g fill="#0f172a">
      <rect x="22" y="-52" width="20" height="20"/><rect x="62" y="-52" width="20" height="20"/>
      <rect x="42" y="-32" width="20" height="20"/><rect x="82" y="-32" width="20" height="20"/>
      <rect x="22" y="-12" width="20" height="20"/><rect x="62" y="-12" width="20" height="20"/>
      <rect x="42" y="8" width="20" height="20"/><rect x="82" y="8" width="20" height="20"/>
      <rect x="22" y="28" width="20" height="20"/><rect x="62" y="28" width="20" height="20"/>
    </g>
  </g>
  <text x="430" y="135" font-size="13" font-weight="700" fill="#0f172a">ChArUco on flange</text>
  <text x="430" y="153" font-size="11.5" fill="#475569">camera measures T<tspan font-size="9" dy="2">cam←board</tspan></text>

  <!-- camera on tripod -->
  <g>
    <path d="M720 430 L735 320 M790 430 L775 320 M755 430 L755 320" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <rect x="710" y="285" width="90" height="42" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
    <circle cx="730" cy="306" r="12" fill="#0ea5e9" stroke="#fff" stroke-width="2"/>
    <circle cx="780" cy="306" r="12" fill="#0ea5e9" stroke="#fff" stroke-width="2"/>
    <text x="755" y="270" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">ZED 2i (fixed)</text>
    <!-- camera frame -->
    <g stroke-width="3"><line x1="710" y1="306" x2="675" y2="306" stroke="#dc2626"/><line x1="710" y1="306" x2="710" y2="271" stroke="#16a34a"/></g>
    <!-- view cone -->
    <path d="M708 290 L430 200 L430 250 L708 322 z" fill="#0ea5e9" opacity="0.10"/>
  </g>

  <!-- the unknown transform -->
  <path d="M210 360 C 360 470, 600 470, 740 330" fill="none" stroke="#7c3aed" stroke-width="3" stroke-dasharray="2 0" marker-end="url(#t)"/>
  <rect x="400" y="452" width="170" height="26" rx="6" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="485" y="470" font-size="14" font-weight="700" fill="#6d28d9" text-anchor="middle">T_base_camera (solve)</text>
</svg>
