<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <text x="30" y="34" font-size="22" font-weight="700" fill="#0f172a">Capture poses: diverse (good) vs degenerate (refused)</text>

  <!-- GOOD -->
  <g>
    <rect x="30" y="55" width="400" height="270" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
    <text x="50" y="85" font-size="16" font-weight="700" fill="#15803d">✓ Diverse — PASS</text>
    <text x="50" y="106" font-size="12.5" fill="#166534">≥3 rotation axes · ≥3 working distances · tilts to ±45°</text>
    <!-- camera -->
    <rect x="40" y="150" width="40" height="28" rx="5" fill="#1e293b"/><circle cx="60" cy="164" r="7" fill="#0ea5e9"/>
    <text x="60" y="200" font-size="11" fill="#475569" text-anchor="middle">ZED</text>
    <!-- boards at varied depth/orientation -->
    <g stroke="#15803d" stroke-width="2" fill="#dcfce7">
      <g transform="translate(150,120) rotate(-25)"><rect x="-22" y="-22" width="44" height="44"/></g>
      <g transform="translate(250,180) rotate(35)"><rect x="-26" y="-26" width="52" height="52"/></g>
      <g transform="translate(360,140) rotate(-10)"><rect x="-18" y="-18" width="36" height="36"/></g>
      <g transform="translate(200,260) rotate(60)"><rect x="-24" y="-24" width="48" height="48"/></g>
      <g transform="translate(340,250) rotate(15)"><rect x="-20" y="-20" width="40" height="40"/></g>
    </g>
    <text x="230" y="312" font-size="12" fill="#166534" text-anchor="middle">focal length, principal point &amp; depth all observable</text>
  </g>

  <!-- BAD -->
  <g>
    <rect x="470" y="55" width="400" height="270" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
    <text x="490" y="85" font-size="16" font-weight="700" fill="#b91c1c">✗ Coplanar / one depth — FAIL</text>
    <text x="490" y="106" font-size="12.5" fill="#991b1b">all on the table plane · one distance · tiny rotations</text>
    <rect x="480" y="150" width="40" height="28" rx="5" fill="#1e293b"/><circle cx="500" cy="164" r="7" fill="#0ea5e9"/>
    <text x="500" y="200" font-size="11" fill="#475569" text-anchor="middle">ZED</text>
    <!-- coplanar boards (same plane, same size, ~same orientation) -->
    <line x1="560" y1="245" x2="840" y2="245" stroke="#fca5a5" stroke-width="2" stroke-dasharray="5 5"/>
    <g stroke="#b91c1c" stroke-width="2" fill="#fee2e2">
      <g transform="translate(600,225)"><rect x="-22" y="-22" width="44" height="44"/></g>
      <g transform="translate(680,225)"><rect x="-22" y="-22" width="44" height="44"/></g>
      <g transform="translate(760,225)"><rect x="-22" y="-22" width="44" height="44"/></g>
    </g>
    <text x="670" y="312" font-size="12" fill="#991b1b" text-anchor="middle">weak in Z &amp; tilt → the old ~1–2 cm height error</text>
  </g>
</svg>
